<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Analyst</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0f0f0f;
  --surface:    #161616;
  --surface2:   #1e1e1e;
  --border:     #262626;
  --border2:    #333;
  --text:       #e2e2e2;
  --text2:      #888;
  --text3:      #444;
  --accent:     #00d4a0;
  --accent-dim: #00d4a018;
  --user-bg:    #0d1f18;
  --error:      #ff6b6b;
  --font:       'IBM Plex Sans', sans-serif;
  --mono:       'IBM Plex Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.logo svg { width: 16px; height: 16px; fill: #000; }
.title-group h1 { font-size: 14px; font-weight: 500; color: var(--text); }
.title-group p  { font-size: 11px; color: var(--text2); font-family: var(--mono); }
.header-right { display: flex; align-items: center; gap: 8px; }

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); transition: background 0.3s;
}
.status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.status-dot.error  { background: var(--error); }
.status-label { font-size: 11px; font-family: var(--mono); color: var(--text2); }

/* stream toggle */
.stream-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-family: var(--mono); color: var(--text2);
  cursor: pointer; user-select: none;
}
.stream-toggle input { accent-color: var(--accent); cursor: pointer; }

.btn-clear {
  font-size: 11px; font-family: var(--mono); color: var(--text2);
  background: none; border: 1px solid var(--border2);
  padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.btn-clear:hover { border-color: var(--accent); color: var(--accent); }

/* ── Config bar ── */
.config-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
.config-bar label { font-size: 11px; font-family: var(--mono); color: var(--text2); white-space: nowrap; }
.config-bar input {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--mono); font-size: 11px;
  padding: 4px 8px; border-radius: 4px; outline: none; transition: border-color 0.15s;
}
.config-bar input:focus { border-color: var(--accent); }
#inp-url { width: 200px; }
#inp-sid { width: 130px; }

.role-select {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--mono); font-size: 11px;
  padding: 4px 8px; border-radius: 4px; outline: none; cursor: pointer;
}
.role-select:focus { border-color: var(--accent); }

.role-badge { font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.role-badge.cs       { background: #1a2535; color: #60a5fa; border: 1px solid #60a5fa33; }
.role-badge.spv      { background: #1a2520; color: #00d4a0; border: 1px solid #00d4a033; }
.role-badge.finance  { background: #251f10; color: #f59e0b; border: 1px solid #f59e0b33; }
.role-badge.director { background: #251520; color: #c084fc; border: 1px solid #c084fc33; }
.role-badge.admin    { background: #251010; color: #ff6b6b; border: 1px solid #ff6b6b33; }

.history-badge {
  font-size: 10px; font-family: var(--mono);
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid #00d4a033; padding: 1px 6px; border-radius: 10px;
}

/* ── Messages ── */
#messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.msg { display: flex; gap: 12px; max-width: 820px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.user   { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai     { align-self: flex-start; }
.msg.system { align-self: center; }

.avatar {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; font-family: var(--mono);
  flex-shrink: 0; margin-top: 2px;
}
.msg.user .avatar { background: var(--accent); color: #000; }
.msg.ai   .avatar { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }

.bubble {
  padding: 10px 14px; border-radius: 10px;
  font-size: 13.5px; line-height: 1.65; max-width: 680px; word-break: break-word;
}
.msg.user .bubble {
  background: var(--user-bg); border: 1px solid #00d4a025;
  border-bottom-right-radius: 3px; color: var(--text);
}
.msg.ai .bubble {
  background: var(--surface2); border: 1px solid var(--border);
  border-bottom-left-radius: 3px; color: var(--text);
}
.msg.system .bubble {
  background: transparent; border: 1px solid var(--border);
  color: var(--text2); font-size: 11px; font-family: var(--mono);
  padding: 6px 12px; border-radius: 20px;
}

/* Markdown */
.bubble pre {
  background: var(--bg); border: 1px solid var(--border2); border-radius: 6px;
  padding: 10px 12px; overflow-x: auto; margin: 8px 0;
  font-family: var(--mono); font-size: 12px; line-height: 1.5; color: #aaa;
}
.bubble code {
  font-family: var(--mono); font-size: 12px;
  background: var(--bg); padding: 1px 5px; border-radius: 3px; color: var(--accent);
}
.bubble pre code { background: none; padding: 0; color: inherit; }
.bubble strong { font-weight: 500; color: var(--text); }
.bubble em     { color: var(--text2); font-style: italic; }
.bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; display: flex; flex-direction: column; gap: 3px; }
.bubble h1, .bubble h2, .bubble h3 { font-weight: 500; margin: 10px 0 4px; color: var(--text); }
.bubble h1 { font-size: 15px; }
.bubble h2 { font-size: 14px; }
.bubble h3 { font-size: 13px; color: var(--text2); }
.bubble table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; font-family: var(--mono); }
.bubble th, .bubble td { padding: 5px 10px; border: 1px solid var(--border2); text-align: left; }
.bubble th { background: var(--surface); color: var(--accent); font-weight: 500; }
.bubble tr:nth-child(even) td { background: var(--bg); }

.meta { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: 4px; padding: 0 2px; }
.msg.user .meta { text-align: right; }

/* Typing indicator */
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--text2); animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-5px); opacity: 1; }
}

/* Stream cursor */
.stream-cursor {
  display: inline-block; width: 2px; height: 14px;
  background: var(--accent); margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ── Input area ── */
.input-area {
  padding: 12px 20px 16px; border-top: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
#inp-msg {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--font); font-size: 13.5px;
  padding: 9px 14px; border-radius: 8px; outline: none; resize: none;
  min-height: 40px; max-height: 140px; line-height: 1.5; transition: border-color 0.15s;
}
#inp-msg:focus { border-color: var(--accent); }
#inp-msg::placeholder { color: var(--text3); }

#btn-send {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
#btn-send:hover   { background: #00b88a; }
#btn-send:active  { transform: scale(0.95); }
#btn-send:disabled { background: var(--border2); cursor: not-allowed; }
#btn-send svg { width: 16px; height: 16px; fill: #000; }
#btn-send.loading svg { display: none; }
#btn-send.loading::after {
  content: ''; width: 14px; height: 14px;
  border: 2px solid #00000030; border-top-color: #000;
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.hint { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: 6px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>
    </div>
    <div class="title-group">
      <h1>AI Analyst</h1>
      <p id="model-label">— · —</p>
    </div>
  </div>
  <div class="header-right">
    <label class="stream-toggle" title="Aktifkan streaming response">
      <input type="checkbox" id="chk-stream" checked>
      stream
    </label>
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">checking...</span>
    <button class="btn-clear" onclick="clearSession()">reset sesi</button>
  </div>
</header>

<div class="config-bar">
  <label>Gateway URL</label>
  <input id="inp-url" value="http://localhost:3001" placeholder="http://localhost:3001">
  <label>Session ID</label>
  <input id="inp-sid" value="demo-1" placeholder="user-123">
  <label>Role</label>
  <select id="inp-role" class="role-select" onchange="onRoleChange()">
    <option value="cs">cs — Customer Service</option>
    <option value="spv" selected>spv — Supervisor</option>
    <option value="finance">finance — Finance</option>
    <option value="director">director — Director</option>
    <option value="admin">admin — Administrator</option>
  </select>
  <span id="history-info" class="history-badge" style="display:none">0 pesan</span>
</div>

<div id="messages">
  <div class="msg system">
    <div class="bubble">ketik pertanyaan untuk memulai</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="inp-msg" placeholder="Tanya sesuatu..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="btn-send" onclick="sendMessage()" title="Kirim">
      <svg viewBox="0 0 16 16"><path d="M1 1l14 7-14 7V9.5l10-1.5-10-1.5V1z"/></svg>
    </button>
  </div>
  <p class="hint">Enter kirim · Shift+Enter baris baru · stream: respons muncul langsung</p>
</div>

<script>
const $ = id => document.getElementById(id)

let historyCount = 0
let isLoading    = false

// ── Markdown renderer ─────────────────────────────────────────
function renderMarkdown(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n')

  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```json([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/```(\w*)([\s\S]*?)```/g, (_, lang, c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>')
    .replace(/^\-\s(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>')
}

// ── Health check ──────────────────────────────────────────────
async function checkHealth() {
  const url = $('inp-url').value.trim()
  try {
    const r = await fetch(`${url}/api/health`, { signal: AbortSignal.timeout(4000) })
    const d = await r.json()
    $('status-dot').className    = 'status-dot online'
    $('status-label').textContent = 'online'
    $('model-label').textContent  = `${d.ollama_model} · ${d.mcp_tools?.length ?? 0} tools`
  } catch {
    $('status-dot').className    = 'status-dot error'
    $('status-label').textContent = 'offline'
  }
}

// ── Tambah pesan ke UI ────────────────────────────────────────
function addMessage(role, text, extra = {}) {
  const wrap = $('messages')
  const div  = document.createElement('div')
  div.className = `msg ${role}`

  const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })

  if (role === 'system') {
    div.innerHTML = `<div class="bubble">${text}</div>`
  } else if (role === 'user') {
    div.innerHTML = `
      <div class="avatar">YO</div>
      <div>
        <div class="bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="meta">${time}</div>
      </div>`
  } else {
    const hBadge = extra.history_count != null
      ? `<span class="history-badge">${extra.history_count} pesan</span>` : ''
    const rBadge = extra.role
      ? `<span class="role-badge ${extra.role}">${extra.role}</span>` : ''
    div.innerHTML = `
      <div class="avatar">AI</div>
      <div>
        <div class="bubble"><p>${renderMarkdown(text)}</p></div>
        <div class="meta">${time} ${rBadge} ${hBadge}</div>
      </div>`
    if (extra.history_count != null) {
      historyCount = extra.history_count
      $('history-info').textContent = `${historyCount} pesan`
      $('history-info').style.display = 'inline'
    }
  }

  wrap.appendChild(div)
  wrap.scrollTop = wrap.scrollHeight
  return div
}

// ── Typing indicator ──────────────────────────────────────────
function showTyping() {
  const wrap = $('messages')
  const div  = document.createElement('div')
  div.className = 'msg ai'
  div.id = 'typing'
  div.innerHTML = `
    <div class="avatar">AI</div>
    <div class="bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`
  wrap.appendChild(div)
  wrap.scrollTop = wrap.scrollHeight
}

function hideTyping() {
  const el = $('typing')
  if (el) el.remove()
}

// ── SEND — non-streaming ──────────────────────────────────────
async function sendNonStream(url, sid, role, message) {
  showTyping()
  try {
    const res  = await fetch(`${url}/api/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ session_id: sid, message, role }),
    })
    const data = await res.json()
    hideTyping()

    if (!res.ok) {
      addMessage('system', `error ${res.status}: ${data.error || 'unknown'}`)
    } else {
      addMessage('ai', data.reply || '(tidak ada balasan)', {
        history_count: data.history_count,
        role:          data.role,
      })
    }
  } catch (err) {
    hideTyping()
    addMessage('system', `koneksi gagal: ${err.message}`)
    $('status-dot').className    = 'status-dot error'
    $('status-label').textContent = 'offline'
  }
}

// ── SEND — streaming (SSE) ────────────────────────────────────
async function sendStream(url, sid, role, message) {
  // Buat bubble AI kosong dulu dengan cursor berkedip
  const wrap   = $('messages')
  const msgDiv = document.createElement('div')
  msgDiv.className = 'msg ai'
  const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
  const rBadge = `<span class="role-badge ${role}">${role}</span>`
  msgDiv.innerHTML = `
    <div class="avatar">AI</div>
    <div>
      <div class="bubble"><p id="stream-content"></p></div>
      <div class="meta" id="stream-meta">${time} ${rBadge}</div>
    </div>`
  wrap.appendChild(msgDiv)
  wrap.scrollTop = wrap.scrollHeight

  const contentEl = msgDiv.querySelector('#stream-content')
  const metaEl    = msgDiv.querySelector('#stream-meta')

  // Tambah cursor berkedip
  const cursor = document.createElement('span')
  cursor.className = 'stream-cursor'
  contentEl.appendChild(cursor)

  let fullText = ''

  try {
    const res = await fetch(`${url}/api/chat/stream`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ session_id: sid, message, role }),
    })

    if (!res.ok) {
      cursor.remove()
      contentEl.innerHTML = `<em style="color:var(--error)">error ${res.status}</em>`
      return
    }

    const reader  = res.body.getReader()
    const decoder = new TextDecoder()

    while (true) {
      const { done, value } = await reader.read()
      if (done) break

      const chunk = decoder.decode(value, { stream: true })
      const lines = chunk.split('\n')

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const content = line.slice(6)
        if (!content.trim()) continue

        // Deteksi status message (diawali *— )
        if (content.startsWith('*—') || content.includes('— memproses')) {
          // Tampilkan sebagai status sementara, tidak masuk fullText
          contentEl.innerHTML = `<em style="color:var(--text2)">${content.replace(/\*/g,'')}</em>`
          contentEl.appendChild(cursor)
          wrap.scrollTop = wrap.scrollHeight
          continue  // ← tidak masuk fullText
        }

       if (fullText && !fullText.endsWith('\n') && content.startsWith('\n')) {
          fullText += content
        } else {
          fullText += content
        }
        contentEl.innerHTML = renderMarkdown(fullText)
        contentEl.appendChild(cursor)
        wrap.scrollTop = wrap.scrollHeight
      }
    }

  } catch (err) {
    contentEl.innerHTML = `<em style="color:var(--error)">koneksi gagal: ${err.message}</em>`
    $('status-dot').className    = 'status-dot error'
    $('status-label').textContent = 'offline'
  } finally {
    // Hapus cursor, render markdown final
    cursor.remove()
    contentEl.innerHTML = renderMarkdown(fullText) || '(tidak ada balasan)'
    wrap.scrollTop = wrap.scrollHeight

    // Update history badge
    historyCount++
    $('history-info').textContent = `${historyCount} pesan`
    $('history-info').style.display = 'inline'
  }
}

// ── MAIN SEND ─────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return

  const url     = $('inp-url').value.trim()
  const sid     = $('inp-sid').value.trim() || 'demo-1'
  const role    = $('inp-role').value || 'cs'
  const msgEl   = $('inp-msg')
  const message = msgEl.value.trim()
  const useStream = $('chk-stream').checked

  if (!message) return

  msgEl.value = ''
  autoResize(msgEl)
  setLoading(true)
  addMessage('user', message)

  try {
    if (useStream) {
      await sendStream(url, sid, role, message)
    } else {
      await sendNonStream(url, sid, role, message)
    }
  } finally {
    setLoading(false)
    msgEl.focus()
  }
}

function setLoading(v) {
  isLoading = v
  const btn = $('btn-send')
  btn.disabled = v
  btn.classList.toggle('loading', v)
}

// ── Role change / session reset ───────────────────────────────
function onRoleChange() {
  const role   = $('inp-role').value
  const labels = {
    cs: 'CS', spv: 'SPV', finance: 'Finance', director: 'Director', admin: 'Admin',
  }
  const url = $('inp-url').value.trim()
  const sid = $('inp-sid').value.trim() || 'demo-1'
  fetch(`${url}/api/sessions/${sid}`, { method: 'DELETE' }).catch(() => {})

  historyCount = 0
  $('history-info').style.display = 'none'
  $('messages').innerHTML = ''
  addMessage('system', `mode: ${labels[role] || role} — sesi direset`)
}

async function clearSession() {
  const url = $('inp-url').value.trim()
  const sid = $('inp-sid').value.trim() || 'demo-1'
  try { await fetch(`${url}/api/sessions/${sid}`, { method: 'DELETE' }) } catch {}
  historyCount = 0
  $('history-info').style.display = 'none'
  $('messages').innerHTML = ''
  addMessage('system', 'sesi direset — mulai percakapan baru')
}

// ── Helpers ───────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 140) + 'px'
}

// ── Init ──────────────────────────────────────────────────────
checkHealth()
setInterval(checkHealth, 15000)
$('inp-msg').focus()
</script>
</body>
</html>
